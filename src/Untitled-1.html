<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Status Card</title>
  <style>
    @property --level {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 10%;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #000;
      display: grid;
      place-items: center;
    }

    .card {
      position: relative;
      width: 450px;
      height: 450px;
      /* 修复在某些缩放下的偏移，确保完全居中 */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* shared SVG sizing */
    .svg-bright,
    .svg-dimmed {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    /* bright neon outline */
    .svg-bright {
      z-index: 1;
      stroke: rgba(0, 230, 255, 0.75);
      filter:
        drop-shadow(0 0 6px #00ebff)
        drop-shadow(0 0 10px rgba(55, 255, 255, 0.7));
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawSVG 3.3s ease forwards infinite alternate;
    }

    @keyframes drawSVG {
      0%   { stroke-dashoffset: 500; }
      100% { stroke-dashoffset: 0; }
    }

    /* dimmed outline, clipped to the glass panel region */
    .svg-dimmed {
      z-index: 2;
      stroke: rgba(0, 230, 255, 0.25);
      filter: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* 调整裁剪区域以匹配玻璃面板的位置 */
      clip-path: inset(56.1px 119.1px 188.9px 125.9px round 25px);
      pointer-events: none;
    }

    /* glass panel */
    .glass-card {
      position: absolute;
      left: 50.75%;
      top: 35.25%;
      transform: translate(-50%, -50%);
      width: 205px;
      height: 205px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        inset 0 0 0.8px rgba(255, 255, 255, 0.55),
        inset 0 0 18px rgba(255, 255, 255, 0.08),
        0 10px 24px rgba(0, 0, 0, 0.65);
      z-index: 3;
      overflow: hidden;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg,
        rgba(255, 255, 255, 0.25) 0%,
        rgba(255, 255, 255, 0.02) 45%,
        rgba(255, 255, 255, 0.28) 100%);
      background-size: 220% 220%;
      animation: sheen 14s ease-in-out infinite;
      border-radius: inherit;
    }

    .glass-card:hover {
      cursor: pointer;
    }

    .glass-card:hover::before {
      border: 1px solid rgba(0, 230, 255, 1);
      cursor: pointer;
      filter: drop-shadow(0px 0px 15px rgba(0, 230, 255, 1));
      background: linear-gradient(125deg,
        rgba(255, 255, 255, 0.25) 0%,
        rgba(0, 0, 0, 0.02) 45%,
        rgba(0, 0, 0, 0.28) 100%);
    }

    .battery-info:hover span {
      color: rgba(0, 230, 255, 1);
    }

    .card:hover .battery-percentage::after {
      color: rgba(255, 255, 255, 1);
      text-shadow: none;
    }

    @keyframes sheen {
      0%, 100% { background-position: 0 0; }
      50%      { background-position: 100% 100%; }
    }

    /* battery info */
    .battery-info {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 22px;
      font-family: "Inter", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #eafdff;
    }

    /* battery percentage counter */
    .battery-percentage {
      position: relative;
      font-size: 46px;
      font-weight: 700;
      line-height: 1;
      color: transparent; /* hide original text */
    }
    
    .battery-percentage::after {
      content: "10%"; /* start at 10% */
      position: absolute;
      top: 0; 
      left: 0;
      animation: count-up 336.6s steps(102) infinite;
      color: rgba(0, 230, 255, 1);
      text-shadow: 0px 0px 15px rgba(0, 230, 255, 0.95), 0px 0px 30px rgba(0, 230, 255, 1);

    /* charging status & cycles */
    .charging-status,
    .battery-cycles {
      display: flex;
      align-items: center;
      gap: .55em;
      font-size: .72rem;
      color: #b6e5f2;
    }

    .charging-status span {
      animation: glowingCharge 3s ease-in-out infinite alternate;
    }

    @keyframes glowingCharge {
      0% {
        color: white;
      }
      100% {
        color: rgba(0, 230, 255, 1);
        filter: brightness(2) contrast(1.3) saturate(1.4);
        text-shadow: 5px 5px 25px rgba(0, 230, 255, 1);
      }
    }

    /* icons */
    .icon {
      width: 1em;
      height: 1em;
      flex-shrink: 0;
      fill: currentColor;
      stroke: currentColor;
      filter: drop-shadow(0 0 2px #00ebff);
    }

    /* battery bar */
    .battery {
      margin-left: -11px;
      width: 175px;
      height: 7px;
      border-radius: 4px;
      background: #444;
      background-image: linear-gradient(to right, #007a99 0 0, #00e9ff 100% 0);
      background-repeat: no-repeat;
      background-size: var(--level, 10%) 100%;
      --segments: 6;
      --gap: 2px;
      mask: repeating-linear-gradient(
        to right,
        #fff 0 calc(100% / var(--segments) - var(--gap)),
        transparent calc(100% / var(--segments) - var(--gap)) calc(100% / var(--segments))
      );
      -webkit-mask: repeating-linear-gradient(
        to right,
        #fff 0 calc(100% / var(--segments) - var(--gap)),
        transparent calc(100% / var(--segments) - var(--gap)) calc(100% / var(--segments))
      );
      animation: chargeUp 336.6s steps(102) infinite;
    }

    @keyframes chargeUp {
      0%   { --level: 10%; }
      90%  { --level: 100%; }
      91%  { --level: 0%; }
      100% { --level: 9%; }
    }

    @media (max-width: 480px) {
      .card {
        position: absolute;
        top: 0;
        left: -12%;
      }
    }

  <div class="card">
    <!-- bright neon outline -->
    <svg class="svg-bright"
         viewBox="0 0 200 200"
         xmlns="http://www.w3.org/2000/svg"
         fill="none"

         stroke-linejoin="round">
      <path d="M 40 44 Q 40 17 71 17 H 136 Q 162 17 162 42
               V 49 Q 162 73 136 73 H 74 Q 40 73 40 97
               V 103 Q 40 124 74 124 H 136 Q 163 124 163 102"/>
    </svg>

    <!-- dimmed outline clipped to the glass window -->
    <svg class="svg-dimmed"
         viewBox="0 0 200 200"

         stroke="transparent"

         stroke-linejoin="round">
      <path d="M 40 44 Q 40 17 71 17 H 136 Q 162 17 162 42
               V 49 Q 162 73 136 73 H 74 Q 40 73 40 97
               V 103 Q 40 124 74 124 H 136 Q 163 124 163 102"/>
    </svg>

    <div class="glass-card">
      <div class="battery-info">
        <!-- start at 10% for the CSS counter -->
        <div class="battery-percentage">10%</div>

        <div class="charging-status">
          <svg class="icon icon-charging"
               viewBox="0 0 24 24"
               xmlns="http://www.w3.org/2000/svg"
               fill="currentColor">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span>CHARGING</span>
        </div>

        <div class="battery-health">
          <svg class="icon icon-health"
               viewBox="0 0 24 24"
               xmlns="http://www.w3.org/2000/svg"
               fill="none"
               stroke="currentColor"
               stroke-width="2">
            <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
            <line x1="23" y1="13" x2="23" y2="11"/>
          </svg>
          <span>10% BATTERY HEALTH</span>
        </div>

        <div class="battery-cycles">
          <svg class="icon icon-cycles"
               viewBox="0 0 24 24"
               xmlns="http://www.w3.org/2000/svg"
               fill="currentColor">
            <path d="M17 1l4 4-4 4v-3H7v-2h10V1z"/>
            <path d="M7 23l-4-4 4-4v3h10v2H7v3z"/>
          </svg>
          <span>215 CYCLES</span>
        </div>

        <!-- bar can stay at whatever level you choose -->
        <div class="battery"></div>
      </div>
    </div>
  </div>
